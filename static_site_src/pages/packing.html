    <header class="page-header">
        <h1>Packing List</h1>
        <p>What to bring for October in Ireland</p>
    </header>

    <main>
        <section class="packing-categories">
            <div class="card">
                <h2>Clothing</h2>
                <ul class="checklist">
                    <li><label><input type="checkbox"> Rain jacket</label></li>
                    <li><label><input type="checkbox"> Layers / sweaters</label></li>
                    <li><label><input type="checkbox"> Comfortable walking shoes</label></li>
                </ul>
            </div>
            <div class="card">
                <h2>Documents</h2>
                <ul class="checklist">
                    <li><label><input type="checkbox"> Passport</label></li>
                    <li><label><input type="checkbox"> Travel insurance info</label></li>
                    <li><label><input type="checkbox"> Booking confirmations</label></li>
                </ul>
            </div>
            <div class="card">
                <h2>Essentials</h2>
                <ul class="checklist">
                    <li><label><input type="checkbox"> Phone &amp; charger</label></li>
                    <li><label><input type="checkbox"> Power adapter (Type G)</label></li>
                    <li><label><input type="checkbox"> Medications</label></li>
                </ul>
            </div>
        </section>
    </main>

    <footer>
